---

- name: '[commconf] Create a directory if it does not exist'
  file:
    path: /data/GoOne/commconf/
    state: directory
    mode: '0755'
  tags: 'commconf_init'

- name: '[commconf] Copy sensitive files'
  copy:
    src: ../common/sensitive/
    dest: /data/GoOne/commconf/
  tags: "commconf_push"

- name: '[commconf] Copy game config'
  template:
    src: server_conf.yaml
    dest: /data/GoOne/commconf/server_conf.yaml
  tags: 'commconf_push'