---
- hosts: "{{ target_group | default('dst') }}"
  vars:
    password: 'Iori@123'
    core_dir: /data/GoOne/cores/
    core_pattern: /data/GoOne/cores/core_%e_%p

    # Packages by OS family
    debian_packages:
      - libunwind-dev
      - vim
      - net-tools
      - cron
      - psmisc
      - at
      - htop
      - rsync
      - python3-pip
      - iproute2
      - daemonize
      - procps

    redhat_packages:
      # epel is needed for some packages like htop (depends on distro)
      - epel-release
      - libunwind-devel
      - vim
      - net-tools
      - cronie
      - psmisc
      - at
      - htop
      - rsync
      - python3-pip
      - iproute
      - daemonize
      - procps-ng
  tasks:
    # 1. 安装依赖库（自动识别 Debian/Ubuntu vs RHEL/CentOS）
    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      become: yes
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install required packages (Debian/Ubuntu)
      package:
        name: "{{ debian_packages }}"
        state: present
      become: yes
      when: ansible_facts['os_family'] == 'Debian'

    # RedHat family notes:
    # - If inventory forces ansible_python_interpreter=/usr/bin/python3 on a yum-based distro (e.g. CentOS 7),
    #   Ansible's yum/package modules may fail due to missing python2 rpm/yum bindings.
    # - We handle this by:
    #   * Using dnf module when pkg_mgr is dnf (RHEL8+/Fedora)
    #   * Falling back to raw yum commands when pkg_mgr is yum (CentOS7)

    - name: Install required packages (RHEL/CentOS, dnf)
      dnf:
        name: "{{ redhat_packages }}"
        state: present
        update_cache: yes
      become: yes
      when:
        - ansible_facts['os_family'] == 'RedHat'
        - ansible_facts['pkg_mgr'] is defined
        - ansible_facts['pkg_mgr'] in ['dnf', 'dnf5']

    - name: Install required packages (RHEL/CentOS, yum fallback via raw)
      raw: |
        set -e
        command -v yum >/dev/null 2>&1
        yum -y install epel-release || true
        yum -y makecache || true
        yum -y install {{ redhat_packages | difference(['epel-release']) | join(' ') }}
      become: yes
      changed_when: true
      when:
        - ansible_facts['os_family'] == 'RedHat'
        - ansible_facts['pkg_mgr'] is defined
        - ansible_facts['pkg_mgr'] == 'yum'

    # 2. 系统设置
    # 修改资源限制（使用 /etc/security/limits.conf）
    - name: Set core soft limit
      pam_limits:
        domain: root
        limit_type: soft
        limit_item: core
        value: 1000000000
        dest: /etc/security/limits.conf  # 显式指定路径
      become: yes

    - name: Set core hard limit
      pam_limits:
        domain: root
        limit_type: hard
        limit_item: core
        value: 1000000000
        dest: /etc/security/limits.conf
      become: yes

    - name: Set nofile soft limit
      pam_limits:
        domain: root
        limit_type: soft
        limit_item: nofile
        value: 100000
        dest: /etc/security/limits.conf
      become: yes

    - name: Set nofile hard limit
      pam_limits:
        domain: root
        limit_type: hard
        limit_item: nofile
        value: 100000
        dest: /etc/security/limits.conf
      become: yes

    # 创建 core 文件目录（Ubuntu 路径保持不变）
    - name: Create core dump directory
      file:
        path: "{{ core_dir }}"
        owner: root
        group: root
        mode: '0755'
        state: directory
      become: yes

    - name: Configure core pattern
      sysctl:
        name: kernel.core_pattern
        value: "{{ core_pattern }}"
        sysctl_set: yes
        state: present
        reload: yes
      become: yes