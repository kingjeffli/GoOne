base_cfg:
  pprof: true
  admin_server:
    enabled: true
    ip: ""
    port: 0
  register_addr: '{{ zk_address }}'
  bus_mq_addr: '{{ rabbitmq_address }}'
  game_data_dir: '{{ root_path }}/gamedata'
  sensitive_words_file: '{{ root_path }}/commconf/sensitive.txt'

  http_sign:
    - index_name: default
      private_key: d1233f2b7e9885ffb8a8268d06f44c6e2
      sign_name: sign
      expired_time: 1800
      timestamp_name: timestamp
      sign_type: md5
      request_id_name: ''

  db_instances:
    - instance_id: 3
      ip: {{ redis_ip }}
      port: {{ redis_port }}
      password: {{ redis_passwd }}
      is_cluster: {{ redis_use_cluster }}
      description: brief info data

  orm_instances:
    - index_name: default
      master:
        ip: "192.168.50.250"
        port: 3306
        user: root
        password: "sxy123456"
        db_name: poker
      slaves: []
      description: "test db1"
      max_idle: 10
      max_open: 200
      show_sql: true
      init_flag: true
      drive_name: mysql

  rest_api_config:
    - service_name: default
      urls:
        - 'http://192.168.50.250:8000/mg/api/sdk/getGameRole?'
      sign_name: default

  nacos_conf:
    ip_addr: 192.168.50.250
    port: 8848
    namespace_id: df4ad231-f231-49a1-b309-44493e949dd0
    group_name: poker_gameconf
    user_name: poker
    password: poker123
    log_dir: \tmp\nacos\log
    cache_dir: \tmp\nacos\cache
    rotate_time: 1h
    max_age: 3
    log_level: debug


connsvr:
  self_bus_id: '1.1.1.{{ instance_id }}'
  listen_port: 11000
  log_dir: ./logs/
  log_level: debug

infosvr:
  self_bus_id: '1.1.3.{{ instance_id }}'
