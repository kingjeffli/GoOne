# 根层级直接对应 BaseCfg 的字段
base_cfg:
  pprof: true
  register_addr: '192.168.50.250:2182'
  bus_mq_addr: 'amqp://guest:guest@192.168.50.250:5672/'
  game_data_dir: ../common/gamedata/data
  sensitive_words_file: ../common/conf/sensitive.txt


  # for unit tests we keep this empty (see common/gconf/config_test.go expectations)
  http_sign: []

  db_instances:
    - instance_id: 3
      ip: 192.168.50.250
      port: 6379
      password: 123456
      is_cluster: false
      description: brief info data


  orm_instances:
    - index_name: default
      master:
        ip: 192.168.50.250
        port: 3306
        user: root
        password: sxy123456
        db_name: poker
      slaves: []
      description: test db1
      max_idle: 10
      max_open: 200
      show_sql: true
      init_flag: true
      drive_name: mysql


  rest_api_config:
    - service_name: default
      urls:
        - 'http://192.168.50.250:8000/mg/api/sdk/getGameRole?'
      sign_name: default

  nacos_conf:
    ip_addr: 192.168.50.250
    port: 8848
    namespace_id: df4ad231-f231-49a1-b309-44493e949dd0
    group_name: poker_gameconf
    user_name: poker
    password: poker123
    log_dir: \tmp\nacos\log
    cache_dir: \tmp\nacos\cache
    rotate_time: 1h
    max_age: 3
    log_level: debug

connsvr:
  self_bus_id: 1.1.1.2
  listen_port: 11000
