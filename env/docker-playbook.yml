---
- hosts: "{{ target_group | default('dev_local') }}"
  become: yes
  gather_facts: yes
  vars:
    docker_action: "{{ docker_action | default('install') }}"
    docker_compose_dir: "{{ docker_compose_dir | default('/data/GoOne/env') }}"
    docker_compose_src: "{{ docker_compose_src | default(playbook_dir ~ '/env_docker.yaml') }}"
    docker_project: "{{ docker_project | default('goone-env') }}"
    docker_compose_version: "{{ docker_compose_version | default('v2.29.7') }}"
    docker_compose_arch: >-
      {{
        'x86_64' if (ansible_facts['architecture'] | default('x86_64')) in ['x86_64','amd64'] else
        'aarch64' if (ansible_facts['architecture'] | default('x86_64')) in ['aarch64','arm64'] else
        'x86_64'
      }}

  tasks:
    - name: Show basic info
      debug:
        msg:
          - "docker_action={{ docker_action }}"
          - "docker_compose_dir={{ docker_compose_dir }}"
          - "docker_project={{ docker_project }}"
          - "os_family={{ ansible_facts['os_family'] | default('unknown') }}"
          - "pkg_mgr={{ ansible_facts['pkg_mgr'] | default('unknown') }}"

    - name: Ensure curl installed (Debian)
      apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: yes
      when:
        - ansible_facts['os_family'] == 'Debian'
        - docker_action in ['install', 'up', 'restart']

    - name: Ensure curl installed (RedHat via raw)
      raw: |
        set -e
        if command -v dnf >/dev/null 2>&1; then
          dnf -y install ca-certificates curl || true
        elif command -v yum >/dev/null 2>&1; then
          yum -y install ca-certificates curl || true
        fi
      changed_when: true
      when:
        - ansible_facts['os_family'] == 'RedHat'
        - docker_action in ['install', 'up', 'restart']

    - name: Check docker presence
      command: docker --version
      register: docker_version
      changed_when: false
      failed_when: false

    - name: Install Docker Engine (get.docker.com)
      shell: |
        set -e
        curl -fsSL https://get.docker.com | sh
      args:
        executable: /bin/bash
      when:
        - docker_action in ['install', 'up', 'restart']
        - docker_version.rc != 0

    - name: Ensure docker service enabled + started
      service:
        name: docker
        enabled: yes
        state: started
      when: docker_action in ['install', 'up']

    - name: Restart docker service
      service:
        name: docker
        state: restarted
      when: docker_action == 'restart'

    - name: Check docker compose plugin
      command: docker compose version
      register: docker_compose_check
      changed_when: false
      failed_when: false
      when: docker_action in ['install', 'up', 'restart', 'status', 'logs', 'down']

    - name: Install docker compose plugin (download cli-plugin)
      block:
        - name: Create docker cli-plugins dir
          file:
            path: /usr/local/lib/docker/cli-plugins
            state: directory
            mode: '0755'

        - name: Download docker compose plugin binary
          get_url:
            url: "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-{{ docker_compose_arch }}"
            dest: /usr/local/lib/docker/cli-plugins/docker-compose
            mode: '0755'
      when:
        - docker_action in ['install', 'up', 'restart']
        - docker_compose_check is defined
        - docker_compose_check.rc != 0

    - name: Ensure compose directory exists
      file:
        path: "{{ docker_compose_dir }}"
        state: directory
        mode: '0755'
      when: docker_action in ['install', 'up', 'restart']

    - name: Upload docker compose file
      copy:
        src: "{{ docker_compose_src }}"
        dest: "{{ docker_compose_dir }}/docker-compose.yml"
        mode: '0644'
      when: docker_action in ['install', 'up', 'restart']

    - name: docker compose up
      shell: |
        set -e
        docker compose -p "{{ docker_project }}" up -d
      args:
        chdir: "{{ docker_compose_dir }}"
        executable: /bin/bash
      when: docker_action in ['install', 'up', 'restart']

    - name: docker compose down
      shell: |
        set -e
        docker compose -p "{{ docker_project }}" down
      args:
        chdir: "{{ docker_compose_dir }}"
        executable: /bin/bash
      when: docker_action == 'down'

    - name: docker ps
      command: docker ps
      register: docker_ps
      changed_when: false
      when: docker_action in ['status', 'logs']

    - name: docker compose ps
      shell: docker compose -p "{{ docker_project }}" ps
      args:
        chdir: "{{ docker_compose_dir }}"
        executable: /bin/bash
      register: docker_compose_ps
      changed_when: false
      failed_when: false
      when: docker_action in ['status', 'logs']

    - name: Show status
      debug:
        msg:
          - "docker ps:"
          - "{{ docker_ps.stdout | default('') }}"
          - "docker compose ps:"
          - "{{ docker_compose_ps.stdout | default('') }}"
      when: docker_action == 'status'

    - name: docker compose logs (tail 200)
      shell: docker compose -p "{{ docker_project }}" logs --tail=200
      args:
        chdir: "{{ docker_compose_dir }}"
        executable: /bin/bash
      register: docker_compose_logs
      changed_when: false
      failed_when: false
      when: docker_action == 'logs'

    - name: Show logs
      debug:
        msg: "{{ docker_compose_logs.stdout | default('') }}"
      when: docker_action == 'logs'


