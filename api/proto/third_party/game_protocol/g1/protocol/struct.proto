syntax = "proto3";

// Minimal subset copied from github.com/Iori372552686/game_protocol (struct.proto),
// kept for ssrpc IDL-driven code generation to reference existing Go types.
//
// IMPORTANT:
// - package + message names + field numbers must match the upstream proto
//   to remain wire-compatible.
package g1.protocol;

option go_package = "github.com/Iori372552686/game_protocol/protocol;g1_protocol";

// inner room TickReq
message InnerTickReq {
  int64  nowMs      = 1; // 当前时间戳
  uint64 roomId     = 2; // 房间id
  uint32 src_bus_id = 3; // 发送者bus id
}


