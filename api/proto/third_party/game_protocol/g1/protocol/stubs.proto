syntax = "proto3";

// Stub-only proto declarations for types defined in github.com/Iori372552686/game_protocol.
//
// Why stubs?
// - We want protoc-gen-goone to be able to reference existing Go types (g1_protocol.*)
//   in service signatures, without vendoring the full upstream .proto set yet.
// - These messages are intentionally empty; runtime decoding uses the real Go types
//   from the go module, which already contain the correct protobuf tags.
//
// IMPORTANT:
// - package + message names MUST match the upstream generated Go types.
// - option go_package MUST match the upstream Go import path.
package g1.protocol;

option go_package = "github.com/Iori372552686/game_protocol/protocol;g1_protocol";

message RoomListReq {}
message RoomListRsp {}

message QuickStartReq {}
