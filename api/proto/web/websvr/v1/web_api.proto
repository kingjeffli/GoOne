syntax = "proto3";

package web.websvr.v1;

import "goone/options/v1/options.proto";

option go_package = "github.com/Iori372552686/GoOne/api/gen/web/websvr/v1;websvrv1";

message PingReq {
  string msg = 1;
}

message PingRsp {
  string msg = 1;
  int64 server_unix_ms = 2;
}

message MsgSecCheckReq {
  string account_id = 1;
  string msg_content = 2;
  string time = 3;
}

message MsgSecCheckRsp {
  // For compatibility with old endpoint: data is always present under the outer ssrpc HTTP envelope.
  // This message is the "data" payload when code==ERR_OK.
  string msg = 1;
}

// WebApiService exposes HTTP-friendly endpoints for web_svr (Phase 2).
service WebApiService {
  rpc Ping(PingReq) returns (PingRsp) {
    option (goone.options.v1.ssrpc) = {
      http_path: "/v1/web/ping"
      http_method: "GET"
      comment: "web ping"
    };
  }

  rpc MsgSecCheck(MsgSecCheckReq) returns (MsgSecCheckRsp) {
    option (goone.options.v1.ssrpc) = {
      http_path: "/v1/web/msg-sec-check"
      http_method: "POST"
      comment: "msg security check"
    };
  }
}

