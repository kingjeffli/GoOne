syntax = "proto3";

package game.mainsvr.v1;

import "goone/options/v1/options.proto";
import "third_party/game_protocol/g1/protocol/stubs.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/Iori372552686/GoOne/api/gen/game/mainsvr/v1;mainsvrv1";

