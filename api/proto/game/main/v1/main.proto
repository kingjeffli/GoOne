syntax = "proto3";

package game.main.v1;

import "goone/options/v1/options.proto";
import "game/common/v1/common.proto";

option go_package = "github.com/Iori372552686/GoOne/api/gen/game/main/v1;mainv1";

// MainService is an example GoOne game service.
// Phase A: it will be exposed via SSPacket (ssrpc option below).
service MainService {
  rpc Login(LoginReq) returns (LoginRsp) {
    option (goone.options.v1.ssrpc) = {
      // Example cmd (uint32). Use your real CMD value here.
      cmd: 0x01020001
      // cmd_resp is optional; if omitted/0, generator will default to cmd+1.
      comment: "user login"
    };
  }
}

message LoginReq {
  uint64 uid = 1;
  string token = 2;
}

message LoginRsp {
  game.common.v1.Ret ret = 1;
  uint64 uid = 2;
  string welcome = 3;
}


